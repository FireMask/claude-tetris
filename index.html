<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="header-row">
      <h1 class="game-title">TETRIS</h1>
      <label class="theme-toggle" title="Alternar modo claro/oscuro">
        <input type="checkbox" id="theme-switch" aria-label="Alternar modo claro/oscuro" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="start-screen" class="overlay">
      <div class="overlay-box">
        <p id="start-title" class="overlay-title">TETRIS</p>
        <div class="highscore-panel">
          <span class="label">TOP 5</span>
          <ol id="start-highscores" class="highscore-list"></ol>
        </div>
        <p id="start-stats" class="stats-line"></p>
        <div class="overlay-buttons">
          <button id="start-btn">Jugar</button>
          <button class="reset-records-btn" type="button">Reiniciar récords</button>
        </div>
      </div>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title" class="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="overlay-extra">
          <div id="name-entry" class="name-entry hidden">
            <input type="text" id="player-name-input" maxlength="15" placeholder="Tu nombre" autocomplete="off" />
            <button id="save-score-btn" type="button">Guardar</button>
          </div>
          <div class="highscore-panel">
            <span class="label">TOP 5</span>
            <ol id="overlay-highscores" class="highscore-list"></ol>
          </div>
          <p id="overlay-stats" class="stats-line"></p>
          <button class="reset-records-btn" type="button">Reiniciar récords</button>
        </div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
